<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#4A6E8A" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0F2A45"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- corner registration marks -->
  <g stroke="#4A6E8A" stroke-width="1" opacity="0.6">
    <line x1="40" y1="60" x2="88" y2="60"/><line x1="64" y1="36" x2="64" y2="84"/>
    <line x1="1112" y1="60" x2="1160" y2="60"/><line x1="1136" y1="36" x2="1136" y2="84"/>
    <line x1="40" y1="570" x2="88" y2="570"/><line x1="64" y1="546" x2="64" y2="594"/>
    <line x1="1112" y1="570" x2="1160" y2="570"/><line x1="1136" y1="546" x2="1136" y2="594"/>
  </g>

  <!-- eyebrow -->
  <text x="100" y="150" font-family="IBM Plex Mono, monospace" font-size="20" fill="#FF7A45" letter-spacing="2">+ PLANO 01 — M3 DIGITAL</text>

  <!-- headline -->
  <text x="98" y="230" font-family="IBM Plex Mono, monospace" font-weight="700" font-size="52" fill="#EAF1F6">La web de tu negocio</text>
  <text x="98" y="292" font-family="IBM Plex Mono, monospace" font-weight="700" font-size="52" fill="#EAF1F6">necesita <tspan fill="#FF7A45">cimientos</tspan>.</text>

  <!-- subline -->
  <text x="100" y="350" font-family="Work Sans, sans-serif" font-size="24" fill="#8FA9C0">Webs con WordPress y automatizaciones a medida</text>
  <text x="100" y="382" font-family="Work Sans, sans-serif" font-size="24" fill="#8FA9C0">para pymes y autónomos.</text>

  <!-- mini blueprint browser mockup -->
  <g transform="translate(760,420)" opacity="0.95">
    <rect x="0" y="0" width="340" height="150" rx="2" fill="none" stroke="#D7E4EE" stroke-width="1.5"/>
    <line x1="0" y1="26" x2="340" y2="26" stroke="#D7E4EE" stroke-width="1"/>
    <circle cx="16" cy="13" r="3" fill="none" stroke="#D7E4EE" stroke-width="1"/>
    <circle cx="28" cy="13" r="3" fill="none" stroke="#D7E4EE" stroke-width="1"/>
    <circle cx="40" cy="13" r="3" fill="none" stroke="#D7E4EE" stroke-width="1"/>
    <rect x="16" y="42" width="130" height="30" fill="none" stroke="#D7E4EE" stroke-width="1"/>
    <rect x="160" y="42" width="164" height="30" fill="none" stroke="#FF7A45" stroke-width="1.2"/>
    <rect x="16" y="86" width="98" height="50" fill="none" stroke="#D7E4EE" stroke-width="1"/>
    <rect x="121" y="86" width="98" height="50" fill="none" stroke="#D7E4EE" stroke-width="1"/>
    <rect x="226" y="86" width="98" height="50" fill="none" stroke="#D7E4EE" stroke-width="1"/>
  </g>

  <!-- footer mark -->
  <g transform="translate(100,560)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FF7A45" stroke-width="2">
      <path d="M4 20V8l8-4 8 4v12"/><path d="M9 20v-6h6v6"/>
    </svg>
  </g>
  <text x="132" y="577" font-family="IBM Plex Mono, monospace" font-size="20" font-weight="700" fill="#EAF1F6">M3 <tspan fill="#8FA9C0" font-weight="400">DIGITAL</tspan></text>
</svg>
